<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orario - 5BINF</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sigmaorario</h1>
            <nav class="main-nav">
                <a href="index.html" class="active">Orario</a>
                <a href="calendario.html">Calendario</a>
            </nav>
        </header>

        <main>
            <div class="schedule-container">
                <div class="schedule-header">
                    <h2><i class="fas fa-calendar-week"></i> Orario Settimanale</h2>
                    <div>
                        <button class="btn" onclick="exportSchedule()">
                            <i class="fas fa-download"></i> Esporta
                        </button>
                        <button class="btn" onclick="printSchedule()">
                            <i class="fas fa-print"></i> Stampa
                        </button>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table id="scheduleTable">
                        <thead>
                            <tr>
                                <th>Ora</th>
                                <th>Lunedì</th>
                                <th>Martedì</th>
                                <th>Mercoledì</th>
                                <th>Giovedì</th>
                                <th>Venerdì</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="current-info">
                <div class="info-item">
                    <span class="label">Ora:</span>
                    <span class="value" id="currentTime">--:--</span>
                </div>
                <div class="info-item">
                    <span class="label">Giorno:</span>
                    <span class="value" id="currentDay">-</span>
                </div>
                <div class="info-item">
                    <span class="label">Lezione:</span>
                    <span class="value highlight" id="currentLesson">-</span>
                </div>
                <div class="info-item">
                    <span class="label">Prossima:</span>
                    <span class="value" id="nextLesson">-</span>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <span class="legend-color lab"></span>
                    <span>Laboratorio</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color today"></span>
                    <span>Lezione attuale</span>
                </div>
            </div>

            <div class="actions-bar">
                <div class="actions-group">
                    <button class="btn" onclick="showToday()" title="Evidenzia il giorno corrente">
                        <i class="fas fa-calendar-day"></i> Oggi
                    </button>
                    <button class="btn" onclick="toggleLabs()" title="Mostra/nascondi laboratori">
                        <i class="fas fa-flask"></i> Lab
                    </button>
                </div>
                <div class="divider"></div>
                <div class="actions-group">
                    <button class="btn" onclick="resetView()" title="Ripristina vista originale">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>
                <div class="actions-search">
                    <input type="text" id="searchMateria" placeholder="Cerca materia..." onkeypress="if(event.key==='Enter')searchMateria()">
                    <button class="btn" onclick="searchMateria()" title="Cerca">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <p>5BINF - A.S. 2025/2026</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/realtime.js"></script>
    <a href="snake.html" class="easter-egg">🐍</a>
</body>
</html>
