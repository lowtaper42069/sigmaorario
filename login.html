<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - 5BINF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --cal-bg: #0d1117;
            --cal-header-bg: #161b22;
            --cal-border: #30363d;
            --cal-text: #c9d1d9;
            --cal-text-muted: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--cal-bg);
            color: var(--cal-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 1.5rem;
        }

        .login-card {
            background: var(--cal-header-bg);
            border: 1px solid var(--cal-border);
            border-radius: 8px;
            padding: 2rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .login-header p {
            color: var(--cal-text-muted);
            font-size: 0.85rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--cal-text-muted);
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.7rem 0.75rem;
            background: var(--cal-bg);
            border: 1px solid var(--cal-border);
            border-radius: 6px;
            color: var(--cal-text);
            font-size: 0.95rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #238636;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--cal-border);
            border-radius: 6px;
            background: transparent;
            color: var(--cal-text);
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(255,255,255,0.05);
        }

        .btn-primary {
            background: #238636;
            border-color: #238636;
            color: #fff;
        }

        .btn-primary:hover {
            background: #2ea043;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid #f85149;
            color: #f85149;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--cal-text-muted);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-link a:hover {
            color: var(--cal-text);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-primary.loading .spinner {
            display: inline-block;
        }

        .btn-primary.loading .btn-text {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Accedi</h1>
                <p>Gestione calendario eventi</p>
            </div>

            <div id="errorMsg" class="error"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Email</label>
                    <input type="email" id="username" required autocomplete="email" placeholder="Inserisci email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="current-password" placeholder="Inserisci password">
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="btn-text">Accedi</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="back-link">
                <a href="calendario.html">
                    <i class="fas fa-arrow-left"></i> Torna al calendario
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                errorMsg.textContent = 'Compila tutti i campi';
                errorMsg.classList.add('show');
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            errorMsg.classList.remove('show');

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    errorMsg.textContent = error.message === 'Invalid login credentials' 
                        ? 'Credenziali non valide' 
                        : error.message;
                    errorMsg.classList.add('show');
                    document.getElementById('password').value = '';
                } else {
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('userId', data.user.id);
                    sessionStorage.setItem('email', data.user.email);
                    window.location.href = 'calendario.html';
                }
            } catch (err) {
                errorMsg.textContent = 'Errore di connessione';
                errorMsg.classList.add('show');
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        document.getElementById('username').addEventListener('input', function() {
            errorMsg.classList.remove('show');
        });
    </script>
</body>
</html>
