<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostazioni - 5BINF</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --cal-bg: #0d1117;
            --cal-header-bg: #161b22;
            --cal-border: #30363d;
            --cal-text: #c9d1d9;
            --cal-text-muted: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--cal-bg);
            color: var(--cal-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--cal-border);
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--cal-text);
            letter-spacing: -0.02em;
        }

        .main-nav {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background: var(--cal-header-bg);
            border-radius: 8px;
            border: 1px solid var(--cal-border);
            max-width: 320px;
            margin: 1rem auto 0;
        }

        .main-nav a {
            color: var(--cal-text-muted);
            text-decoration: none;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .main-nav a:hover {
            color: var(--cal-text);
            background: rgba(255,255,255,0.05);
        }

        .main-nav a.active {
            color: var(--cal-text);
            background: #238636;
        }

        .section {
            margin-bottom: 2rem;
        }

        .section-header {
            margin-bottom: 1.5rem;
        }

        .section-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-header h2 i {
            color: var(--cal-text-muted);
        }

        .card {
            background: var(--cal-header-bg);
            border: 1px solid var(--cal-border);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .form-row {
            margin-bottom: 1.25rem;
        }

        .form-row:last-child {
            margin-bottom: 0;
        }

        .form-row label {
            display: block;
            font-size: 0.875rem;
            color: var(--cal-text-muted);
            margin-bottom: 0.5rem;
        }

        .form-row input,
        .form-row select {
            width: 100%;
            padding: 0.625rem 0.75rem;
            background: var(--cal-bg);
            border: 1px solid var(--cal-border);
            border-radius: 6px;
            color: var(--cal-text);
            font-size: 0.875rem;
        }

        .form-row input:focus,
        .form-row select:focus {
            outline: none;
            border-color: #238636;
        }

        .form-row input[readonly] {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--cal-border);
        }

        .checkbox-row:last-child {
            border-bottom: none;
        }

        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #238636;
        }

        .checkbox-row label {
            font-size: 0.875rem;
            color: var(--cal-text);
            cursor: pointer;
        }

        .theme-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        .theme-option {
            border: 1px solid var(--cal-border);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-option:hover {
            border-color: var(--cal-text-muted);
        }

        .theme-option.selected {
            border-color: #238636;
            background: rgba(35, 134, 54, 0.1);
        }

        .theme-preview {
            height: 40px;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .theme-preview.dark {
            background: linear-gradient(135deg, #0d1117, #161b22);
        }

        .theme-preview.light {
            background: linear-gradient(135deg, #ffffff, #f6f8fa);
        }

        .theme-preview.auto {
            background: linear-gradient(135deg, #0d1117 50%, #ffffff 50%);
        }

        .theme-option span {
            font-size: 0.8rem;
            color: var(--cal-text-muted);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--cal-bg);
            border: 1px solid var(--cal-border);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--cal-text);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--cal-text-muted);
            margin-top: 0.25rem;
        }

        .btn {
            padding: 0.625rem 1rem;
            border: 1px solid var(--cal-border);
            border-radius: 6px;
            background: transparent;
            color: var(--cal-text);
            font-size: 0.875rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--cal-text-muted);
        }

        .btn-primary {
            background: #238636;
            border-color: #238636;
            color: #fff;
        }

        .btn-primary:hover {
            background: #2ea043;
            border-color: #2ea043;
        }

        .btn-danger {
            background: #da3633;
            border-color: #da3633;
            color: #fff;
        }

        .btn-danger:hover {
            background: #f85149;
            border-color: #f85149;
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--cal-border);
            font-size: 0.875rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-row span:first-child {
            color: var(--cal-text-muted);
        }

        .info-row span:last-child {
            color: var(--cal-text);
            font-weight: 500;
        }

        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--cal-border);
            text-align: center;
            color: var(--cal-text-muted);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .main-nav {
                flex-wrap: wrap;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .theme-options {
                grid-template-columns: 1fr;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Impostazioni</h1>
            <nav class="main-nav">
                <a href="index.html">Orario</a>
                <a href="calendario.html" class="active">Calendario</a>
            </nav>
        </header>

        <main>
            <div class="section">
                <div class="section-header">
                    <h2><i class="fas fa-user"></i> Profilo</h2>
                </div>
                <div class="card">
                    <div class="grid-2">
                        <div class="form-row">
                            <label>Nome e Cognome</label>
                            <input type="text" value="Studente 5BINF">
                        </div>
                        <div class="form-row">
                            <label>Email</label>
                            <input type="email" value="studente@scuola.it">
                        </div>
                        <div class="form-row">
                            <label>Classe</label>
                            <input type="text" value="5BINF" readonly>
                        </div>
                        <div class="form-row">
                            <label>Anno Scolastico</label>
                            <input type="text" value="2024/2025" readonly>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="saveProfile()">
                            <i class="fas fa-save"></i> Salva
                        </button>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2><i class="fas fa-palette"></i> Aspetto</h2>
                </div>
                <div class="card">
                    <div class="form-row">
                        <label>Tema</label>
                        <div class="theme-options">
                            <div class="theme-option selected" onclick="selectTheme(this)">
                                <div class="theme-preview dark"></div>
                                <span>Scuro</span>
                            </div>
                            <div class="theme-option" onclick="selectTheme(this)">
                                <div class="theme-preview light"></div>
                                <span>Chiaro</span>
                            </div>
                            <div class="theme-option" onclick="selectTheme(this)">
                                <div class="theme-preview auto"></div>
                                <span>Automatico</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-row" style="margin-top: 1.25rem;">
                        <label>Dimensione carattere</label>
                        <select id="fontSize">
                            <option value="small">Piccolo</option>
                            <option value="medium" selected>Medio</option>
                            <option value="large">Grande</option>
                        </select>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="saveAppearance()">
                            <i class="fas fa-check"></i> Applica
                        </button>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2><i class="fas fa-bell"></i> Notifiche</h2>
                </div>
                <div class="card">
                    <div class="checkbox-row">
                        <input type="checkbox" id="notifyVerifications" checked>
                        <label for="notifyVerifications">Notifiche per verifiche imminenti</label>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="notifyAssignments" checked>
                        <label for="notifyAssignments">Notifiche per compiti assegnati</label>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="notifyProjects" checked>
                        <label for="notifyProjects">Notifiche per scadenze progetti</label>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="notifyLabs">
                        <label for="notifyLabs">Notifiche per laboratori</label>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="saveNotifications()">
                            <i class="fas fa-save"></i> Salva
                        </button>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2><i class="fas fa-database"></i> Dati</h2>
                </div>
                <div class="card">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="eventsCount">0</div>
                            <div class="stat-label">Eventi</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="storageUsed">0 KB</div>
                            <div class="stat-label">Spazio</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="lastSync">-</div>
                            <div class="stat-label">Ultima sync</div>
                        </div>
                    </div>
                    <div class="info-row">
                        <span>Stato server</span>
                        <span id="serverStatus">Online</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn" onclick="backupData()">
                            <i class="fas fa-download"></i> Backup
                        </button>
                        <button class="btn" onclick="restoreData()">
                            <i class="fas fa-upload"></i> Ripristina
                        </button>
                        <button class="btn btn-danger" onclick="clearData()">
                            <i class="fas fa-trash"></i> Cancella
                        </button>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2><i class="fas fa-info-circle"></i> Informazioni</h2>
                </div>
                <div class="card">
                    <div class="info-row">
                        <span>Versione</span>
                        <span>v1.0.0</span>
                    </div>
                    <div class="info-row">
                        <span>Anno Scolastico</span>
                        <span>2024/2025</span>
                    </div>
                    <div class="info-row">
                        <span>Classe</span>
                        <span>5BINF</span>
                    </div>
                    <div class="info-row">
                        <span>Licenza</span>
                        <span>Open Source</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>5BINF - A.S. 2024/2025</p>
        </footer>
    </div>

    <script>
        function selectTheme(el) {
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            el.classList.add('selected');
        }

        function saveProfile() {
            const btn = event.target.closest('.btn');
            btn.innerHTML = '<i class="fas fa-check"></i> Salvato';
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-save"></i> Salva';
            }, 2000);
        }

        function saveAppearance() {
            const btn = event.target.closest('.btn');
            btn.innerHTML = '<i class="fas fa-check"></i> Applicato';
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-check"></i> Applica';
            }, 2000);
        }

        function saveNotifications() {
            const btn = event.target.closest('.btn');
            btn.innerHTML = '<i class="fas fa-check"></i> Salvato';
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-save"></i> Salva';
            }, 2000);
        }

        function backupData() {
            const data = {
                events: [],
                settings: {},
                lastUpdate: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_5binf.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function restoreData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    alert('Backup ripristinato con successo');
                }
            };
            input.click();
        }

        function clearData() {
            if (confirm('Cancellare tutti i dati locali?')) {
                localStorage.clear();
                alert('Dati cancellati');
                location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('eventsCount').textContent = Math.floor(Math.random() * 100) + 20;
            document.getElementById('storageUsed').textContent = Math.floor(Math.random() * 500) + 50 + ' KB';
            document.getElementById('lastSync').textContent = new Date().toLocaleTimeString('it-IT', {
                hour: '2-digit',
                minute: '2-digit'
            });
        });
    </script>
</body>
</html>
