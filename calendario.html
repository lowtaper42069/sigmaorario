<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - 5BINF</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/calendario-simple.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --cal-bg: #0d1117;
            --cal-header-bg: #161b22;
            --cal-day-bg: #161b22;
            --cal-border: #30363d;
            --cal-text: #c9d1d9;
            --cal-text-muted: #8b949e;
            --cal-today-bg: #1f3a1f;
            --cal-other-month: #21262d;
            --cal-hover: #1c2128;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--cal-bg);
            color: var(--cal-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--cal-border);
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--cal-text);
            letter-spacing: -0.02em;
        }

        header p {
            color: var(--cal-text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .calendar-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: var(--cal-header-bg);
            border: 1px solid var(--cal-border);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }

        .month-nav {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .month-nav h2 {
            font-size: 1.25rem;
            font-weight: 600;
            min-width: 200px;
            text-align: center;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: transparent;
            border: 1px solid var(--cal-border);
            color: var(--cal-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: var(--cal-hover);
            border-color: var(--cal-text-muted);
        }

        .calendar-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--cal-border);
            border-radius: 6px;
            background: transparent;
            color: var(--cal-text);
            font-size: 0.875rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--cal-hover);
            border-color: var(--cal-text-muted);
        }

        .btn-primary {
            background: #238636;
            border-color: #238636;
            color: #fff;
        }

        .btn-primary:hover {
            background: #2ea043;
            border-color: #2ea043;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--cal-header-bg);
            border: 1px solid var(--cal-border);
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--cal-header-bg);
            border-bottom: 1px solid var(--cal-border);
        }

        .day-header {
            padding: 0.75rem;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--cal-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .calendar-day {
            min-height: 100px;
            padding: 0.5rem;
            border-right: 1px solid var(--cal-border);
            border-bottom: 1px solid var(--cal-border);
            background: var(--cal-day-bg);
            transition: background 0.15s;
        }

        .calendar-day:nth-child(7n) {
            border-right: none;
        }

        .calendar-day:hover {
            background: var(--cal-hover);
        }

        .calendar-day.other-month {
            background: var(--cal-other-month);
            opacity: 0.6;
        }

        .calendar-day.other-month:hover {
            opacity: 0.8;
        }

        .calendar-day.today {
            background: var(--cal-today-bg);
        }

        .day-number {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--cal-text);
            margin-bottom: 0.25rem;
        }

        .calendar-day.today .day-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            background: #238636;
            color: #fff;
            border-radius: 50%;
            font-weight: 600;
        }

        .day-events {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .event {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .event-delete {
            display: none;
        }

        .event-item {
            padding: 0.75rem;
            background: var(--cal-header-bg);
            border: 1px solid var(--cal-border);
            border-left: 3px solid #6e7681;
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }

        .event-item .date {
            font-size: 0.75rem;
            color: var(--cal-text-muted);
        }

        .event-item .title {
            font-weight: 500;
            color: var(--cal-text);
            margin: 0.25rem 0;
        }

        .event-item .meta {
            font-size: 0.75rem;
            color: var(--cal-text-muted);
        }

        .content-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--cal-border);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--cal-text);
        }

        .section-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--cal-header-bg);
            border: 1px solid var(--cal-border);
            border-radius: 8px;
            padding: 1.25rem;
        }

        .card h4 {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--cal-text);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card h4 i {
            color: var(--cal-text-muted);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--cal-border);
            font-size: 0.875rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-row span:first-child {
            color: var(--cal-text-muted);
        }

        .info-row span:last-child {
            color: var(--cal-text);
            font-weight: 500;
        }

        .quick-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .quick-actions .btn {
            justify-content: center;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--cal-header-bg);
            border: 1px solid var(--cal-border);
            border-radius: 8px;
            width: 90%;
            max-width: 480px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--cal-border);
        }

        .modal-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--cal-text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.25rem;
        }

        .close-modal:hover {
            color: var(--cal-text);
        }

        .modal-body {
            padding: 1.25rem;
        }

        .modal-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--cal-border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            color: var(--cal-text-muted);
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.625rem 0.75rem;
            background: var(--cal-bg);
            border: 1px solid var(--cal-border);
            border-radius: 6px;
            color: var(--cal-text);
            font-size: 0.875rem;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #238636;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .color-picker {
            display: flex;
            gap: 0.5rem;
        }

        .color-picker input[type="radio"] {
            display: none;
        }

        .color-picker label {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-picker input[type="radio"]:checked + label {
            border-color: #fff;
        }

        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--cal-border);
            text-align: center;
            color: var(--cal-text-muted);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .calendar-controls {
                flex-direction: column;
                gap: 1rem;
            }

            .month-nav h2 {
                min-width: 160px;
                font-size: 1rem;
            }

            .calendar-day {
                min-height: 70px;
                padding: 0.25rem;
            }

            .day-number {
                font-size: 0.75rem;
            }

            .event {
                font-size: 0.65rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Calendario Scolastico</h1>
            <p>5BINF - A.S. 2024/2025</p>
        </header>

        <main>
            <div class="calendar-controls">
                <div class="month-nav">
                    <button id="prevMonth" class="btn-icon" title="Mese precedente">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <h2 id="currentMonth">Caricamento...</h2>
                    <button id="nextMonth" class="btn-icon" title="Mese successivo">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                
                <div class="calendar-actions">
                    <button id="todayBtn" class="btn">
                        <i class="fas fa-calendar-day"></i> Oggi
                    </button>
                    <button id="addEventBtn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Aggiungi Evento
                    </button>
                </div>
            </div>

            <div class="calendar-header">
                <div class="day-header">Lun</div>
                <div class="day-header">Mar</div>
                <div class="day-header">Mer</div>
                <div class="day-header">Gio</div>
                <div class="day-header">Ven</div>
                <div class="day-header">Sab</div>
                <div class="day-header">Dom</div>
            </div>

            <div class="calendar-grid" id="calendarGrid"></div>

            <div class="content-section">
                <div class="section-header">
                    <h3>Informazioni</h3>
                </div>

                <div class="section-content">
                    <div class="card">
                        <h4><i class="fas fa-clock"></i> Statistiche</h4>
                        <div class="info-row">
                            <span>Eventi totali</span>
                            <span id="eventCount">0</span>
                        </div>
                        <div class="info-row">
                            <span>Questo mese</span>
                            <span id="monthCount">0</span>
                        </div>
                    </div>

                    <div class="card">
                        <h4><i class="fas fa-bolt"></i> Azioni Rapide</h4>
                        <div class="quick-actions">
                            <button id="exportBtn" class="btn">
                                <i class="fas fa-download"></i> Esporta eventi
                            </button>
                            <button id="printBtn" class="btn">
                                <i class="fas fa-print"></i> Stampa calendario
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Calendario scolastico - Ultimo aggiornamento: <span id="lastSync">-</span></p>
        </footer>
    </div>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Nuovo Evento</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="eventForm">
                    <div class="form-group">
                        <label for="eventTitle">Titolo *</label>
                        <input type="text" id="eventTitle" placeholder="Es: Verifica di Matematica" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventDate">Data *</label>
                            <input type="date" id="eventDate" required>
                        </div>
                        <div class="form-group">
                            <label for="eventTime">Ora</label>
                            <input type="time" id="eventTime">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventType">Tipo</label>
                            <select id="eventType">
                                <option value="verifica">Verifica</option>
                                <option value="compito">Compito</option>
                                <option value="progetto">Progetto</option>
                                <option value="laboratorio">Laboratorio</option>
                                <option value="altro">Altro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="eventSubject">Materia</label>
                            <select id="eventSubject">
                                <option value="">Nessuna</option>
                                <option value="informatica">Informatica</option>
                                <option value="sistemi">Sistemi e Reti</option>
                                <option value="matematica">Matematica</option>
                                <option value="italiano">Italiano</option>
                                <option value="inglese">Inglese</option>
                                <option value="storia">Storia</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="eventDescription">Note</label>
                        <textarea id="eventDescription" rows="2" placeholder="Note aggiuntive..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Colore</label>
                        <div class="color-picker">
                            <input type="radio" name="eventColor" value="#6366f1" id="color1" checked>
                            <label for="color1" style="background-color: #6366f1;"></label>
                            
                            <input type="radio" name="eventColor" value="#22c55e" id="color2">
                            <label for="color2" style="background-color: #22c55e;"></label>
                            
                            <input type="radio" name="eventColor" value="#f59e0b" id="color3">
                            <label for="color3" style="background-color: #f59e0b;"></label>
                            
                            <input type="radio" name="eventColor" value="#ef4444" id="color4">
                            <label for="color4" style="background-color: #ef4444;"></label>
                            
                            <input type="radio" name="eventColor" value="#8b5cf6" id="color5">
                            <label for="color5" style="background-color: #8b5cf6;"></label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn cancel-btn">Annulla</button>
                <button type="button" class="btn btn-primary save-btn">Salva</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/calendario-simple.js"></script>
</body>
</html>
