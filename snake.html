<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - Sigmaorario</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --cal-bg: #0d1117;
            --cal-header-bg: #161b22;
            --cal-border: #30363d;
            --cal-text: #e6edf3;
            --cal-text-muted: #8b949e;
            --cal-accent: #238636;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--cal-bg);
            color: var(--cal-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
        }

        html {
            overflow: hidden;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--cal-text);
        }

        .game-container {
            background: var(--cal-header-bg);
            border: 1px solid var(--cal-border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        #gameCanvas {
            background: #000;
            border: 2px solid var(--cal-border);
            border-radius: 4px;
        }

        .score {
            font-size: 1.25rem;
            color: var(--cal-text);
        }

        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: var(--cal-accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn.secondary {
            background: var(--cal-border);
        }

        .instructions {
            color: var(--cal-text-muted);
            font-size: 0.8rem;
            text-align: center;
            max-width: 300px;
        }

        .back-link {
            margin-top: 1rem;
            color: var(--cal-text-muted);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .back-link:hover {
            color: var(--cal-text);
        }

        .dpad {
            display: none;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
            margin-top: 1rem;
            touch-action: none;
        }

        .dpad-btn {
            background: var(--cal-header-bg);
            border: 1px solid var(--cal-border);
            border-radius: 8px;
            color: var(--cal-text);
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }

        .dpad-btn:active {
            background: var(--cal-border);
        }

        .dpad-up { grid-column: 2; grid-row: 1; }
        .dpad-left { grid-column: 1; grid-row: 2; }
        .dpad-center { grid-column: 2; grid-row: 2; }
        .dpad-right { grid-column: 3; grid-row: 2; }
        .dpad-down { grid-column: 2; grid-row: 3; }

        @media (max-width: 768px) {
            .dpad {
                display: grid;
            }
            .instructions {
                display: none;
            }
        }
    </style>
</head>
<body>
    <h1>🐍 Snake</h1>
    <div class="game-container">
        <div class="score">Punteggio: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <div class="controls">
            <button class="btn" id="startBtn" onclick="startGame(false)">Start</button>
            <button class="btn secondary" onclick="resetGame()">Reset</button>
        </div>
        <p class="instructions">Usa le frecce direzionali, WASD o h/j/k/l (nvim) per muovere il serpente</p>
        <div class="dpad">
            <button class="dpad-btn dpad-up" oncontextmenu="return false;" ontouchstart="handleDirection('up')" onclick="handleDirection('up')"><i class="fas fa-chevron-up"></i></button>
            <button class="dpad-btn dpad-left" oncontextmenu="return false;" ontouchstart="handleDirection('left')" onclick="handleDirection('left')"><i class="fas fa-chevron-left"></i></button>
            <button class="dpad-btn dpad-center"></button>
            <button class="dpad-btn dpad-right" oncontextmenu="return false;" ontouchstart="handleDirection('right')" onclick="handleDirection('right')"><i class="fas fa-chevron-right"></i></button>
            <button class="dpad-btn dpad-down" oncontextmenu="return false;" ontouchstart="handleDirection('down')" onclick="handleDirection('down')"><i class="fas fa-chevron-down"></i></button>
        </div>
    </div>
    <a href="index.html" class="back-link">← Torna all'orario</a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');

        const gridSize = 15;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = { x: 10, y: 10 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoop = null;
        let isRunning = false;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            score = 0;
            dx = 1;
            dy = 0;
            scoreElement.textContent = score;
            placeFood();
            draw();
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            snake.forEach(segment => {
                if (segment.x === food.x && segment.y === food.y) {
                    placeFood();
                }
            });
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#238636';
            snake.forEach((segment, index) => {
                ctx.fillRect(
                    segment.x * gridSize,
                    segment.y * gridSize,
                    gridSize - 2,
                    gridSize - 2
                );
            });

            ctx.fillStyle = '#f85149';
            ctx.fillRect(
                food.x * gridSize,
                food.y * gridSize,
                gridSize - 2,
                gridSize - 2
            );
        }

        function update() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            startBtn.textContent = 'Start';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f85149';
            ctx.font = '24px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2);
        }

        function startGame(saveDirection = false) {
            if (isRunning) {
                return;
            }
            isRunning = true;
            const savedDx = dx;
            const savedDy = dy;
            initGame();
            if (saveDirection && (savedDx !== 0 || savedDy !== 0)) {
                dx = savedDx;
                dy = savedDy;
            }
            startBtn.textContent = 'Pausa';
            gameLoop = setInterval(update, 100);
        }

        function resetGame() {
            isRunning = false;
            clearInterval(gameLoop);
            startBtn.textContent = 'Start';
            initGame();
        }

        function handleDirection(dir) {
            if (!isRunning) {
                startGame(true);
            }
            
            switch (dir) {
                case 'up':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'down':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'left':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'right':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const code = e.code;
            const keyCode = e.keyCode;

            const isD = key === 'd' || code === 'KeyD' || keyCode === 68;

            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd', 'k', 'j', 'h', 'l'].includes(key) || ['KeyW', 'KeyA', 'KeyS', 'KeyD'].includes(code) || keyCode === 87 || keyCode === 65 || keyCode === 83 || keyCode === 68) {
                e.preventDefault();
            }

            const isMoveKey = ['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd', 'k', 'j', 'h', 'l'].includes(key) || ['KeyW', 'KeyA', 'KeyS', 'KeyD'].includes(code) || keyCode === 87 || keyCode === 65 || keyCode === 83 || keyCode === 68;

            if (!isRunning) {
                if (isMoveKey) {
                    if (key === 'arrowup' || key === 'k' || key === 'w' || code === 'KeyW' || keyCode === 87) { dx = 0; dy = -1; }
                    else if (key === 'arrowdown' || key === 'j' || key === 's' || code === 'KeyS' || keyCode === 83) { dx = 0; dy = 1; }
                    else if (key === 'arrowleft' || key === 'h' || key === 'a' || code === 'KeyA' || keyCode === 65) { dx = -1; dy = 0; }
                    else if (key === 'arrowright' || key === 'l' || key === 'd' || isD) { dx = 1; dy = 0; }
                    startGame(true);
                }
                return;
            }

            if (key === 'arrowup' || key === 'k' || key === 'w' || code === 'KeyW' || keyCode === 87) {
                if (dy !== 1) { dx = 0; dy = -1; }
            }
            else if (key === 'arrowdown' || key === 'j' || key === 's' || code === 'KeyS' || keyCode === 83) {
                if (dy !== -1) { dx = 0; dy = 1; }
            }
            else if (key === 'arrowleft' || key === 'h' || key === 'a' || code === 'KeyA' || keyCode === 65) {
                if (dx !== 1) { dx = -1; dy = 0; }
            }
            else if (key === 'arrowright' || key === 'l' || key === 'd' || isD) {
                if (dx !== -1) { dx = 1; dy = 0; }
            }
        });

        initGame();
    </script>
</body>
</html>
